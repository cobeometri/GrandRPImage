<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VIP Icon Preview</title>
  <style>
    body { margin: 0; min-height: 100vh; background: #0b0e14; color: #eef2ff; font-family: Arial, sans-serif; }
    main { max-width: 1180px; margin: 0 auto; padding: 32px; }
    h1 { font-size: 26px; margin: 0 0 22px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 22px; }
    figure { margin: 0; padding: 14px; background: #141923; border: 1px solid #293242; border-radius: 8px; }
    img { width: 100%; aspect-ratio: 1; display: block; }
    figcaption { margin-top: 8px; font-size: 13px; color: #c3ccdc; text-align: center; }
  </style>
</head>
<body>
  <main>
    <h1>VIP Icon Preview</h1>
    <section class="grid">
      <figure><img src="vip-1.svg" alt="VIP 1"><figcaption>VIP 1</figcaption></figure>
      <figure><img src="vip-2.svg" alt="VIP 2"><figcaption>VIP 2</figcaption></figure>
      <figure><img src="vip-3.svg" alt="VIP 3"><figcaption>VIP 3</figcaption></figure>
      <figure><img src="vip-4.svg" alt="VIP 4"><figcaption>VIP 4</figcaption></figure>
      <figure><img src="vip-5.svg" alt="VIP 5"><figcaption>VIP 5</figcaption></figure>
      <figure><img src="vip-6.svg" alt="VIP 6"><figcaption>VIP 6</figcaption></figure>
      <figure><img src="vip-7.svg" alt="VIP 7"><figcaption>VIP 7</figcaption></figure>
      <figure><img src="vip-8.svg" alt="VIP 8"><figcaption>VIP 8</figcaption></figure>
      <figure><img src="vip-9.svg" alt="VIP 9"><figcaption>VIP 9</figcaption></figure>
      <figure><img src="vip-10.svg" alt="VIP 10"><figcaption>VIP 10</figcaption></figure>
    </section>
  </main>
</body>
</html>
